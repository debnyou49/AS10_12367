<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2 style="color: rgb(255, 0, 119);">ยินดีต้อนรับเข้าสู่ประชากร</h2>

<table class="table table-hover">
  <thead>
    <tr>
      <th scope="col">รหัสประชากร</th>
      <th scope="col">ชื่อประชากร</th>
      <th scope="col">อายุ</th>
      <th scope="col">แก้ไข</th>
      <th scope="col">ลบ</th>
    </tr>
  </thead>
  <tbody>
    {% for person in all_person %}
    <tr>
      <th scope="row">{{person.id}}</th>
      <td>{{person.name}}</td>
      <td>{{person.age}}</td>
      <td class="text-center">
  <a href="#" class="btn" style="background-color: hotpink; color: rgb(0, 0, 0);">แก้ไข</a>
</td>
<td class="text-center">
  <a href="#" class="btn" style="background-color: rgb(0, 0, 0); color: rgb(255, 255, 255);">ลบ</a>
</td>
    {% endfor %}
  </tbody>
</table>

</body>
</html>
